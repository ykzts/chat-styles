name: Node CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn build

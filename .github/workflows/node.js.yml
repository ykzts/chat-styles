name: Node CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn build
